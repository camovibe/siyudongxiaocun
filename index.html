}

function ProfitView({cost,setCost,supply,setSupply,skuWeeks,skuMaster,isReadOnly}){
  const [showUpload,setShowUpload]=useState(false);
  const [profitSkuCode,setProfitSkuCode]=useState(skuMaster[0]?.code||'');
  const applyUpload = rows=>{
    setCost(p=>{const n={...p};rows.forEach(r=>{n[r.code]=r.c;});return n;});
    setSupply(p=>{const n={...p};rows.forEach(r=>{n[r.code]=r.sp;});return n;});
  };

  const last = PERIODS.length-1;
  /* FIX：skuWeeks[s.code][last] 加可选链，避免某 SKU 无周数据时崩溃 */
  const rows = skuMaster.map(s=>{
    const c=+cost[s.code]||0, sp=+supply[s.code]||0;
    const unit=sp-c, margin=sp>0?unit/sp*100:0;
    const wkSales=skuWeeks[s.code]?.[last]?.sales || 0;
    return {...s, c, sp, unit, margin, wkSales, wkProfit:unit*wkSales};
  });
  const totalProfit = rows.reduce((a,r)=>a+r.wkProfit,0);
  const totalRev = rows.reduce((a,r)=>a+r.sp*r.wkSales,0);
  const avgMargin = totalRev>0?totalProfit/totalRev*100:0;
  const totalWeekGmv = skuMaster.reduce((sum, s) => sum + (skuWeeks[s.code]?.[last]?.gmv || 0), 0);
  const totalCumGmv = skuMaster.reduce((sum, s) => {
    const arr = skuWeeks[s.code] || [];
    return sum + arr.reduce((a, w) => a + (w.gmv || 0), 0);
  }, 0);
  const totalWeekSales = skuMaster.reduce((sum, s) => sum + (skuWeeks[s.code]?.[last]?.sales || 0), 0);
  const prevWeekGmv = skuMaster.reduce((sum, s) => sum + (skuWeeks[s.code]?.[last > 0 ? last - 1 : 0]?.gmv || 0), 0);
  const prevWeekSales = skuMaster.reduce((sum, s) => sum + (skuWeeks[s.code]?.[last > 0 ? last - 1 : 0]?.sales || 0), 0);
  const gmvChg = prevWeekGmv > 0 ? ((totalWeekGmv - prevWeekGmv) / prevWeekGmv) * 100 : 0;
  const salesChg = prevWeekSales > 0 ? ((totalWeekSales - prevWeekSales) / prevWeekSales) * 100 : 0;
  const trend = PERIODS.map((p,i)=>{
    let profit=0; for(const s of skuMaster){const u=(+supply[s.code]||0)-(+cost[s.code]||0);profit+=u*(skuWeeks[s.code]?.[i]?.sales||0);}
    return {label:p.label,profit:Math.round(profit)};
  });

  const masterCodeSet = new Set(skuMaster.map(s=>s.code));
  const unknownCodes = [];
  for(const code of Object.keys(skuWeeks)){
    if(!masterCodeSet.has(code)){
      const totalSales = skuWeeks[code].reduce((sum,w)=>sum+(w.sales||0),0);
      if(totalSales>0) unknownCodes.push({code, totalSales});
    }
  }
  const missingBoth = rows.filter(r=>r.c<=0 && r.sp<=0 && r.wkSales>0);
  const missingCostOnly = rows.filter(r=>r.c<=0 && r.sp>0 && r.wkSales>0);
  const missingSupplyOnly = rows.filter(r=>r.c>0 && r.sp<=0 && r.wkSales>0);

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
        <Kpi icon={<CircleDollarSign className="w-5 h-5"/>} tint="#6366f1" label="本周总GMV" value={'¥'+fmtMoney(totalWeekGmv)} sub={`较上周 ${gmvChg>=0?'+':''}${gmvChg.toFixed(1)}%`}/>
        <Kpi icon={<PackageSearch className="w-5 h-5"/>} tint="#06b6d4" label="本周件数" value={fmtNum(totalWeekSales)} sub={`较上周 ${salesChg>=0?'+':''}${salesChg.toFixed(1)}%`}/>
        <Kpi icon={<BarChart3 className="w-5 h-5"/>} tint="#0d9488" label="累计总GMV" value={'¥'+fmtMoney(totalCumGmv)}/>
        <Kpi icon={<CircleDollarSign className="w-5 h-5"/>} tint="#16a34a" label="本周总毛利" value={'¥'+fmtMoney(totalProfit)}/>
        <Kpi icon={<BarChart3 className="w-5 h-5"/>} tint="#6366f1" label="本周供货收入" value={'¥'+fmtMoney(totalRev)}/>
        <Kpi icon={<Gauge className="w-5 h-5"/>} tint="#0d9488" label="综合毛利率" value={avgMargin.toFixed(2)+'%'}/>
      </div>

      {(unknownCodes.length>0 || missingBoth.length>0 || missingCostOnly.length>0 || missingSupplyOnly.length>0) && (
        <div className="space-y-3">
          {unknownCodes.length>0 && (
            <div className="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3">
              <div className="flex items-start gap-2">
                <AlertTriangle className="w-5 h-5 text-amber-600 mt-0.5 shrink-0"/>
                <div>
                  <p className="text-sm font-semibold text-amber-800">⚠️ 发现 {unknownCodes.length} 个未维护 SKU（有动销但不在商品主数据中）</p>
                  <p className="text-xs text-amber-600 mt-1">{unknownCodes.map(u=>u.code).join('、')}</p>
                </div>
              </div>
            </div>
          )}
          {(missingBoth.length>0 || missingCostOnly.length>0 || missingSupplyOnly.length>0) && (
            <div className="rounded-lg border border-red-200 bg-red-50 px-4 py-3">
              <div className="flex items-start gap-2">
                <AlertCircle className="w-5 h-5 text-red-600 mt-0.5 shrink-0"/>
                <div>
                  <p className="text-sm font-semibold text-red-800">
                    {missingBoth.length>0 && `缺成本+供货价：${missingBoth.length} 个；`}
                    {missingCostOnly.length>0 && `仅缺成本：${missingCostOnly.length} 个；`}
                    {missingSupplyOnly.length>0 && `仅缺供货价：${missingSupplyOnly.length} 个`}
                  </p>
                  <p className="text-xs text-red-600 mt-1">
                    {rows.filter(r=>(r.c<=0||r.sp<=0)&&r.wkSales>0).map(r=>`${r.name}(${r.code})`).slice(0,10).join('、')}
                    {rows.filter(r=>(r.c<=0||r.sp<=0)&&r.wkSales>0).length>10 ? ' 等' : ''}
                  </p>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      <Card title="周度毛利趋势" subtitle="(供货价−成本) × 周销量 求和">
        <div className="h-56 w-full">
          <ResponsiveContainer>
            <AreaChart data={trend}>
              <defs><linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#16a34a" stopOpacity={0.35}/><stop offset="100%" stopColor="#16a34a" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="label" tick={{fontSize:12,fill:'#94a3b8'}}/>
              <YAxis tick={{fontSize:12,fill:'#94a3b8'}} tickFormatter={v=>(v/10000).toFixed(0)+'万'}/>
              <Tooltip formatter={v=>'¥'+fmtMoney(v)}/>
              <Area dataKey="profit" stroke="#16a34a" strokeWidth={2} fill="url(#gP)"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </Card>

      {(() => {
        const pSku = skuMaster.find(s=>s.code===profitSkuCode);
        const pSeries = pSku ? PERIODS.map((p,i)=>{
          const s = pSku;
          const u = (+supply[s.code]||0)-(+cost[s.code]||0);
          const profit = u * (skuWeeks[s.code]?.[i]?.sales || 0);
          return {label: p.label, profit: Math.round(profit), unit: u};
        }) : [];
        return pSku ? (
          <Card title={`${pSku.name} 单品毛利趋势`} subtitle={`商品编码 ${pSku.code} · 单件毛利 ¥${pSeries[pSeries.length-1]?.unit?.toFixed(2) || '-'}`}>
            <div className="h-56 w-full">
              <ResponsiveContainer>
                <AreaChart data={pSeries}>
                  <defs><linearGradient id="gP2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity={0.35}/><stop offset="100%" stopColor="#6366f1" stopOpacity={0}/></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                  <XAxis dataKey="label" tick={{fontSize:12,fill:'#94a3b8'}}/>
                  <YAxis tick={{fontSize:12,fill:'#94a3b8'}} tickFormatter={v=>(v/10000).toFixed(0)+'万'}/>
                  <Tooltip formatter={v=>'¥'+fmtMoney(v)}/>
                  <Area dataKey="profit" stroke="#6366f1" strokeWidth={2} fill="url(#gP2)"/>
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </Card>
        ) : null;
      })()}

      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-2">
          <div className="flex items-center gap-2"><EyeOff className="w-4 h-4 text-slate-400"/><h3 className="font-semibold">成本 / 供货价录入{isReadOnly?'（只读）':'（可编辑）'}</h3></div>
          <div className="flex items-center gap-2">
            {profitSkuCode && <span className="text-xs text-slate-500">当前选中: {skuMaster.find(s=>s.code===profitSkuCode)?.name}</span>}
            {!isReadOnly && (
              <button onClick={()=>setShowUpload(true)}
                className="inline-flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
                <Upload className="w-4 h-4"/>批量上传
              </button>
            )}
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr className="text-slate-500">
                <th className="px-3 py-2 text-left font-medium">商品</th>
                <th className="px-3 py-2 text-right font-medium">成本</th>
                <th className="px-3 py-2 text-right font-medium">供货价</th>
                <th className="px-3 py-2 text-right font-medium">单件毛利</th>
                <th className="px-3 py-2 text-right font-medium">毛利率</th>
                <th className="px-3 py-2 text-right font-medium">本周销量</th>
                <th className="px-3 py-2 text-right font-medium">本周毛利</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r=>{
                const isSel = r.code===profitSkuCode;
                return (
                  <tr key={r.code} onClick={()=>setProfitSkuCode(r.code)} className={`border-b border-slate-50 cursor-pointer transition-colors ${isSel?'bg-indigo-50 hover:bg-indigo-100':'hover:bg-slate-50'}`}>
                    <td className="px-3 py-2"><div className="font-medium text-slate-700">{r.name}</div><div className="text-xs text-slate-400">{r.code}</div></td>
                    <td className="px-3 py-2 text-right" onClick={e=>e.stopPropagation()}>{isReadOnly ? <span className="tabular-nums">¥{r.c.toFixed(2)}</span> : <NumInput value={r.c} onChange={v=>setCost(p=>({...p,[r.code]:v}))}/>}</td>
                    <td className="px-3 py-2 text-right" onClick={e=>e.stopPropagation()}>{isReadOnly ? <span className="tabular-nums">¥{r.sp.toFixed(2)}</span> : <NumInput value={r.sp} onChange={v=>setSupply(p=>({...p,[r.code]:v}))}/>}</td>
                    <td className="px-3 py-2 text-right tabular-nums font-medium" style={{color:r.wkSales===0?'#94a3b8':r.unit>=0?'#16a34a':'#dc2626'}}>{r.wkSales===0?'未售卖':'¥'+r.unit.toFixed(2)}</td>
                    <td className="px-3 py-2 text-right tabular-nums" style={{color:r.wkSales===0?'#94a3b8':r.margin>=30?'#16a34a':r.margin>=15?'#ca8a04':'#dc2626'}}>{r.wkSales===0?'未售卖':r.margin.toFixed(2)+'%'}</td>
                    <td className="px-3 py-2 text-right tabular-nums text-slate-500">{fmtNum(r.wkSales)}</td>
                    <td className="px-3 py-2 text-right tabular-nums font-semibold" style={{color:r.wkSales===0?'#94a3b8':'#1e293b'}}>{r.wkSales===0?'-':'¥'+fmtMoney(r.wkProfit)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <BatchUploadModal open={showUpload} onClose={()=>setShowUpload(false)} mode="cost" onApply={applyUpload} skuMaster={skuMaster}/>
    </div>
  );
}

function PriceCtrlView({ctrl,setCtrl,skuCode,setSkuCode,skuMetrics,skuWeeks,skuMaster,isReadOnly}){
  const [showUpload,setShowUpload]=useState(false);
  const applyUpload = rows=> setCtrl(p=>{const n={...p};rows.forEach(r=>{n[r.code]=r.cp;});return n;});

  const last = PERIODS.length-1;
  /* FIX：skuMetrics[s.code][last] 加可选链，避免崩溃 */
  const rows = skuMaster.map(s=>{
    const cp=+ctrl[s.code]||0;
    const actual=skuMetrics[s.code]?.[last]?.avgPrice || 0;
    const endInv = skuWeeks[s.code] && skuWeeks[s.code][last] ? (skuWeeks[s.code][last].end || 0) : 0;
    const diff=actual-cp, dpct=cp>0?diff/cp*100:0;
    const status = endInv===0?'无库存':actual===0?'无销量':diff< -0.5?'破价':diff<cp*0.03?'临界':'正常';
    return {...s, cp, actual, diff, dpct, status, endInv};
  });
  const breaks = rows.filter(r=>r.status==='破价').length;
  const warns = rows.filter(r=>r.status==='临界').length;
  const zero = rows.filter(r=>r.status==='无库存'||r.status==='无销量').length;
  const sku = skuMaster.find(s=>s.code===skuCode);
  const series = (skuMetrics[skuCode]||[]).map(w=>({period:w.period, actual:+(w.avgPrice||0).toFixed(2), ctrl:+ctrl[skuCode]||0}));
  const stColor = {'破价':'#dc2626','临界':'#ea580c','正常':'#16a34a','无销量':'#94a3b8','无库存':'#cbd5e1'};

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <Kpi icon={<ShieldAlert className="w-5 h-5"/>} tint="#dc2626" label="破价 SKU" value={breaks+' 个'}/>
        <Kpi icon={<TrendingDown className="w-5 h-5"/>} tint="#ea580c" label="临界预警" value={warns+' 个'}/>
        <Kpi icon={<Tag className="w-5 h-5"/>} tint="#16a34a" label="正常" value={(rows.length-breaks-warns-zero)+' 个'}/>
      </div>

      <Card title="实际单价 vs 公域控价" subtitle={`${sku?.name || '—'} — 蓝=分销商倒算单价 ｜ 红虚=公域控价线`}>
        <div className="flex items-center gap-2 mb-2">
          <select value={skuCode} onChange={e=>setSkuCode(e.target.value)} className="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm">
            {skuMaster.map(s=><option key={s.code} value={s.code}>{s.name}</option>)}
          </select>
        </div>
        <div className="h-64 w-full">
          <ResponsiveContainer>
            <LineChart data={series} margin={{top:5,right:10,left:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="period" tick={{fontSize:12,fill:'#94a3b8'}}/>
              <YAxis tick={{fontSize:12,fill:'#94a3b8'}} domain={['auto','auto']}/>
              <Tooltip formatter={v=>'¥'+v.toFixed(2)}/>
              <Legend/>
              <Line name="实际倒算单价" dataKey="actual" stroke="#2563eb" strokeWidth={2} dot={{r:2}}/>
              <Line name="公域控价" dataKey="ctrl" stroke="#dc2626" strokeWidth={2} strokeDasharray="5 4" dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between gap-2">
          <div className="flex items-center gap-2"><EyeOff className="w-4 h-4 text-slate-400"/><h3 className="font-semibold">公域控价录入与破价监控{isReadOnly?'（只读）':'（可编辑）'}</h3></div>
          {!isReadOnly && (
            <button onClick={()=>setShowUpload(true)}
              className="inline-flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
              <Upload className="w-4 h-4"/>批量上传
            </button>
          )}
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr className="text-slate-500">
                <th className="px-3 py-2 text-left font-medium">商品</th>
                <th className="px-3 py-2 text-right font-medium">公域控价</th>
                <th className="px-3 py-2 text-right font-medium">本周实际单价</th>
                <th className="px-3 py-2 text-right font-medium">差额</th>
                <th className="px-3 py-2 text-right font-medium">偏离</th>
                <th className="px-3 py-2 text-left font-medium">状态</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.code} className="border-b border-slate-50 hover:bg-slate-50">
                  <td className="px-3 py-2"><div className="font-medium text-slate-700">{r.name}</div><div className="text-xs text-slate-400">{r.code}</div></td>
                  <td className="px-3 py-2 text-right">{isReadOnly ? <span className="tabular-nums">¥{r.cp.toFixed(2)}</span> : <NumInput value={r.cp} onChange={v=>setCtrl(p=>({...p,[r.code]:v}))}/>}</td>
                  <td className="px-3 py-2 text-right tabular-nums">¥{r.actual.toFixed(2)}</td>
                  <td className="px-3 py-2 text-right tabular-nums" style={{color:r.status==='无库存'||r.status==='无销量'?'#94a3b8':r.diff<0?'#dc2626':'#16a34a'}}>{r.status==='无库存'||r.status==='无销量'?r.status:(r.diff>=0?'+':'')+r.diff.toFixed(2)}</td>
                  <td className="px-3 py-2 text-right tabular-nums" style={{color:r.status==='无库存'||r.status==='无销量'?'#94a3b8':r.diff<0?'#dc2626':'#16a34a'}}>{r.status==='无库存'||r.status==='无销量'?r.status:(r.dpct>=0?'+':'')+r.dpct.toFixed(2)+'%'}</td>
                  <td className="px-3 py-2">
                    <span onClick={()=>setSkuCode(r.code)} className="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium cursor-pointer" style={{background:stColor[r.status]+'1a',color:stColor[r.status]}}>
                      {r.status==='破价'&&<ShieldAlert className="w-3 h-3"/>}{r.status}{r.status==='无销量'&&<span className="ml-1 opacity-70">(库存{fmtNum(r.endInv)})</span>}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <BatchUploadModal open={showUpload} onClose={()=>setShowUpload(false)} mode="price" onApply={applyUpload} skuMaster={skuMaster}/>
    </div>
  );
}

function LockGate({onUnlock,passcode,title,desc}){
  const [val,setVal]=useState(''); const [err,setErr]=useState(false);
  const submit=()=>{ if(val===passcode){onUnlock(true);} else {setErr(true);} };
  return (
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-8 sm:p-12 flex flex-col items-center text-center">
      <div className="p-3 rounded-full bg-indigo-50 mb-4"><Lock className="w-7 h-7 text-indigo-600"/></div>
      <h3 className="text-lg font-bold">{title}</h3>
      <p className="text-sm text-slate-500 mt-1 mb-5 max-w-sm">{desc}</p>
      <div className="flex items-center gap-2">
        <input type="password" value={val} onChange={e=>{setVal(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="输入访问密码"
          className={`border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 ${err?'border-red-400 focus:ring-red-300':'border-slate-200 focus:ring-indigo-400'}`}/>
        <button onClick={submit} className="bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700 flex items-center gap-1">
          <Unlock className="w-4 h-4"/>解锁
        </button>
      </div>
      {err && <p className="text-xs text-red-500 mt-2">密码错误，请重试</p>}
    </div>
  );
}

function Card({title,subtitle,children}){
  return (
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
      <h3 className="font-semibold">{title}</h3>
      {subtitle && <p className="text-xs text-slate-400 mt-0.5 mb-2">{subtitle}</p>}
      {children}
    </div>
  );
}
function Kpi({icon,tint,label,value,chg,sub,onClick}){
  const up=chg>=0;
  return (
    <div className={`bg-white rounded-xl border border-slate-200 shadow-sm p-4 ${onClick?'cursor-pointer hover:border-indigo-300 hover:shadow-md transition-all':''}`} onClick={onClick}>
      <div className="flex items-center justify-between">
        <span className="text-sm text-slate-500">{label}</span>
        <span className="p-1.5 rounded-lg" style={{background:tint+'1a',color:tint}}>{icon}</span>
      </div>
      <div className="mt-2 text-2xl font-bold tabular-nums">{value}</div>
      {chg!==undefined && (
        <div className={`mt-1 text-xs flex items-center gap-1 ${up?'text-green-600':'text-red-500'}`}>
          {up?<TrendingUp className="w-3.5 h-3.5"/>:<TrendingDown className="w-3.5 h-3.5"/>}{pct(chg)}<span className="text-slate-400">环比</span>
        </div>
      )}
      {sub && <div className="mt-1 text-xs text-slate-400">{sub}</div>}
    </div>
  );
}
function NumInput({value,onChange}){
  return (
    <input type="number" step="0.01" value={value} onChange={e=>onChange(e.target.value===''?'':Number(e.target.value))}
      className="w-24 text-right border border-slate-200 rounded-md px-2 py-1 text-sm tabular-nums focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
  );
}

function PasswordSetting({current,onSave,onClose}){
  const [val,setVal]=useState(''); const [confirm,setConfirm]=useState(''); const [err,setErr]=useState('');
  const submit=()=>{
    if(!val){setErr('请输入新密码');return;}
    if(val!==confirm){setErr('两次输入不一致');return;}
    onSave(val); onClose();
  };
  return (
    <div className="fixed inset-0 z-50 flex items-start sm:items-center justify-center bg-black/40 p-4 overflow-y-auto">
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm my-auto">
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-indigo-600"/>设置访问密码</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X className="w-5 h-5"/></button>
        </div>
        <div className="p-5 space-y-4">
          <div className="space-y-2">
            <label className="text-sm text-slate-600">新密码</label>
            <input type="password" value={val} onChange={e=>{setVal(e.target.value);setErr('');}}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          </div>
          <div className="space-y-2">
            <label className="text-sm text-slate-600">确认密码</label>
            <input type="password" value={confirm} onChange={e=>{setConfirm(e.target.value);setErr('');}}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          </div>
          {err && <p className="text-xs text-red-500">{err}</p>}
          <div className="flex justify-end gap-2">
            <button onClick={onClose} className="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">取消</button>
            <button onClick={submit} className="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">保存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function GistSyncModal({data,onLoad,onClose}){
  const [token,setToken] = useState('');
  const [gistId,setGistId] = useState(()=>{
    const saved = localStorage.getItem('zhaofeng_gist_id');
    return saved || DEFAULT_GIST_ID;
  });
  const [status,setStatus] = useState('');
  const [loading,setLoading] = useState(false);

  useEffect(()=>{
    if(window.location.protocol!=='file:'){
      const saved = localStorage.getItem('zhaofeng_gist_id');
      if(saved) setGistId(saved);
    }
  },[]);

  const showMsg = (msg)=>{ setStatus(msg); setTimeout(()=>setStatus(''),4000); };

  const push = async ()=>{
    if(!token){ showMsg('请输入 GitHub PAT Token'); return; }
    setLoading(true);
    try{
      const body = {
        description: '兆丰渠道周转数据',
        public: false,
        files: { 'data.json': { content: JSON.stringify(data, null, 2) } }
      };
      const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
      const method = gistId ? 'PATCH' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if(!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
      const newId = json.id;
      if(newId){
        setGistId(newId);
        if(window.location.protocol!=='file:'){
          localStorage.setItem('zhaofeng_gist_id', newId);
        }
      }
      showMsg(gistId ? '✅ Gist 更新成功' : `✅ Gist 创建成功，ID: ${newId}`);
    }catch(e){ showMsg('❌ 失败: '+e.message); }
    finally{ setLoading(false); }
  };

  const pull = async ()=>{
    if(!gistId){ showMsg('请输入 Gist ID'); return; }
    setLoading(true);
    try{
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: token ? { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } : {}
      });
      const json = await res.json();
      if(!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
      const content = json.files?.['data.json']?.content;
      if(!content) throw new Error('Gist 中未找到 data.json');
      const parsed = JSON.parse(content);
      onLoad(parsed);
      if(window.location.protocol!=='file:'){
        localStorage.setItem('zhaofeng_gist_id', gistId);
      }
      showMsg('✅ 拉取成功，数据已更新');
    }catch(e){ showMsg('❌ 失败: '+e.message); }
    finally{ setLoading(false); }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-start sm:items-center justify-center bg-black/40 p-4 overflow-y-auto">
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-md my-auto">
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-bold flex items-center gap-2"><Upload className="w-5 h-5 text-indigo-600"/>Gist 同步</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X className="w-5 h-5"/></button>
        </div>
        <div className="p-5 space-y-4">
          <div className="rounded-lg bg-amber-50 border border-amber-200 px-3 py-2 text-xs text-amber-700">
            <p className="font-semibold">首次使用流程：</p>
            <ol className="list-decimal list-inside mt-1 space-y-0.5">
              <li>GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)</li>
              <li>生成 Token，勾选 <b>gist</b> 权限</li>
              <li>输入 Token 点击「推送」→ 自动生成 secret Gist</li>
              <li>记录 Gist ID，填入 HTML 中 <code>GIST_ID</code> 常量</li>
            </ol>
          </div>
          <div className="space-y-2">
            <label className="text-sm text-slate-600">GitHub PAT Token（仅推送时需要）</label>
            <input type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          </div>
          <div className="space-y-2">
            <label className="text-sm text-slate-600">Gist ID</label>
            <input type="text" value={gistId} onChange={e=>setGistId(e.target.value)} placeholder="a1b2c3d4e5f6..."
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          </div>
          {status && <p className="text-xs px-3 py-2 rounded-lg bg-slate-50 text-slate-700">{status}</p>}
          <div className="flex justify-end gap-2">
            <button onClick={onClose} className="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">关闭</button>
            <button onClick={pull} disabled={loading} className="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">拉取</button>
            <button onClick={push} disabled={loading} className="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">{loading?'推送中...':'推送'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<Dashboard/>);
</script>
</body>
</html>
